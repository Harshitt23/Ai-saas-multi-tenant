name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://pm:pm@localhost:5432/pm?schema=public
  REDIS_URL: redis://localhost:6379
  JWT_ACCESS_SECRET: ci-access-secret-ci-access-secret
  JWT_REFRESH_SECRET: ci-refresh-secret-ci-refresh-secret

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pm
          POSTGRES_PASSWORD: pm
          POSTGRES_DB: pm
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U pm"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Apply migrations (check)
        run: pnpm --filter @pm/db migrate:deploy

      - name: Build
        run: pnpm build
